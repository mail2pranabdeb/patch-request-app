<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login - Patch Number Generation App</title>
    <!-- Cache buster appended to apply new redesign robustly -->
    <link rel="stylesheet" th:href="@{/css/style.css(v=4.0)}">
</head>

<body style="display: flex; align-items: center; justify-content: center; background-color: var(--bg-body);">
    <div style="width: 100%; max-width: 400px; padding: 20px;">
            <div style="text-align: center; margin-bottom: 30px;">
                <div style="background: var(--primary); color: white; padding: 10px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 15px;">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <h2 style="color: var(--text-main); font-weight: 600; font-size: 1.5rem;">Patch Generation</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Please sign in to your restricted account.</p>
            </div>

        <div class="card" style="margin-bottom: 20px;">
            <div class="card-body" style="padding: 2.5rem 2rem;">
                <form th:action="@{/login}" method="post">
                    <div th:if="${param.error}"
                        style="background:#fff1f0; color:#d92550; padding:10px; margin-bottom:15px; border-radius:4px; font-size:0.85rem; text-align:center; border: 1px solid #f8baba;">
                        Invalid username or password.
                    </div>
                    <div th:if="${param.logout}"
                        style="background:#ecfdf5; color:#065f46; padding:10px; margin-bottom:15px; border-radius:4px; font-size:0.85rem; text-align:center; border: 1px solid #10b981;">
                        You have been logged out securely.
                    </div>

                    <div class="form-group" style="margin-bottom: 15px;">
                        <input type="text" id="username" name="username" class="form-control"
                            placeholder="Admin Username" required autofocus>
                    </div>
                    <div class="form-group" style="margin-bottom: 25px;">
                        <input type="password" id="password" name="password" class="form-control" placeholder="Password"
                            required>
                    </div>

                    <button type="submit" class="btn btn-primary"
                        style="width: 100%; justify-content: center; padding: 0.6rem; font-weight: 600; font-size: 0.95rem;">
                        Sign in to Dashboard
                    </button>
                </form>
            </div>
        </div>
        <div style="text-align: center; font-size: 0.8rem; color: var(--text-muted);">
            &copy; 2026 Secure Internal Tooling
        </div>
    </div>
</body>

</html>
