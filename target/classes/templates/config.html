<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments :: head('Configuration - PatchReq')}"></head>

<body>
    <div th:replace="~{fragments :: topbar}"></div>

    <div class="app-container">
        <div th:replace="~{fragments :: sidebar}"></div>

        <div class="main-wrapper">
            <div class="app-page-title">
                <div class="page-title-heading">
                    <div class="page-title-icon" style="color: var(--warning);">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="3" />
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                        </svg>
                    </div>
                    <div class="page-title-text">
                        <h2>System Configuration</h2>
                        <p>Configure internal Datafix mechanisms and backend identifiers.</p>
                    </div>
                </div>
            </div>

            <div class="content-area">
                <div th:if="${param.success}"
                    style="background:#ecfdf5; color:#065f46; margin-bottom: 20px; padding: 12px 20px; border-radius:0.25rem; border: 1px solid #10b981;">
                    <strong>Success!</strong> Configuration parameters updated securely.
                </div>

                <div class="card" style="max-width: 700px;">
                    <div class="card-header">
                        Administrative Overrides
                    </div>
                    <div class="card-body">
                        <form th:action="@{/config/save}" th:object="${config}" method="post">
                            <input type="hidden" th:field="*{id}" />

                            <div class="form-group">
                                <label class="form-label">Sequence Date Format</label>
                                <input type="text" class="form-control" th:field="*{dateFormat}" required
                                    placeholder="e.g., yyyyMMdd">
                            </div>

                            <div class="form-group">
                                <label class="form-label">Sequence Length</label>
                                <input type="number" class="form-control" th:field="*{sequenceLength}" required>
                            </div>

                            <div class="form-group" style="margin-top:25px;">
                                <label class="form-label">Open Book Last Deployed Patch</label>
                                <input type="text" class="form-control" th:field="*{openBookLastDeployedPatch}"
                                    placeholder="Record the latest patch here">
                            </div>

                            <div class="form-group">
                                <label class="form-label">Closed Book Last Deployed Patch</label>
                                <input type="text" class="form-control" th:field="*{closedBookLastDeployedPatch}"
                                    placeholder="Record the latest patch here">
                            </div>

                            <div
                                style="margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(26,54,126,0.125);">
                                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.6rem;">
                                    Save System Configuration
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
