<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments :: head('Configuration - Patch Number Generation App')}"></head>

<body>
    <div th:replace="~{fragments :: topbar}"></div>

    <div class="app-container">
        <div th:replace="~{fragments :: sidebar('config')}"></div>

        <div class="main-wrapper">
            <div class="app-page-title">
                <div class="page-title-heading">
                    <div class="page-title-icon" style="color: var(--warning);">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="3" />
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                        </svg>
                    </div>
                    <div class="page-title-text">
                        <h2>System Configuration</h2>
                        <p>Configure hierarchical identifiers for Open, Closed, and Max Migration categories.</p>
                    </div>
                </div>
            </div>

            <div class="content-area">
                <div th:if="${param.success}"
                    style="background:#ecfdf5; color:#065f46; margin-bottom: 10px; padding: 8px 15px; border-radius:0.25rem; font-size: 0.85rem; border: 1px solid #10b981;">
                    <strong>Success!</strong> Configuration parameters updated securely.
                </div>

                <div class="card" style="max-width: 900px;">
                    <div class="card-body">
                        <form th:action="@{/config/save}" th:object="${config}" method="post">
                            <input type="hidden" th:field="*{id}" />

                            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;">
                                <!-- Open Book Section -->
                                <div style="border-right: 1px solid rgba(0,0,0,0.05); padding-right: 15px;">
                                    <h4
                                        style="font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; color: var(--primary);">
                                        Open Book Configuration</h4>
                                    <div class="form-group" style="margin-bottom: 6px;">
                                        <label class="form-label" style="font-size: 0.65rem;">Prefix (e.g. Rpp)</label>
                                        <input type="text" class="form-control form-control-sm" th:field="*{openBookPrefix}" required>
                                    </div>
                                    <div class="form-group" style="margin-bottom: 6px;">
                                        <label class="form-label" style="font-size: 0.65rem;">Fix String (e.g. App)</label>
                                        <input type="text" class="form-control form-control-sm" th:field="*{openBookFixString}" required>
                                    </div>
                                    <div class="form-group" style="margin-bottom: 6px;">
                                        <label class="form-label" style="font-size: 0.65rem;">Major (e.g. 11.3)</label>
                                        <input type="text" class="form-control form-control-sm" th:field="*{openBookMajorVersion}" required>
                                    </div>
                                    <div class="form-group" style="margin-bottom: 6px;">
                                        <label class="form-label" style="font-size: 0.65rem;">Minor (e.g. 04)</label>
                                        <input type="text" class="form-control form-control-sm" th:field="*{openBookMinorVersion}" required>
                                    </div>
                                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 5px;">
                                        <div class="form-group">
                                            <label class="form-label" style="font-size: 0.65rem;">RPP1</label>
                                            <input type="number" class="form-control form-control-sm" th:field="*{openBookRPP1}" required>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label" style="font-size: 0.65rem;">RPP2</label>
                                            <input type="number" class="form-control form-control-sm" th:field="*{openBookRPP2}" required>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label" style="font-size: 0.65rem;">RPP3</label>
                                            <input type="number" class="form-control form-control-sm" th:field="*{openBookRPP3}" required>
                                        </div>
                                    </div>
                                    <div class="form-group" style="margin-top: 8px;">
                                        <label class="form-label" style="color: var(--primary); font-size: 0.65rem;">Last Deployed Version</label>
                                        <input type="text" class="form-control form-control-sm" th:field="*{openBookLastDeployedPatch}" required>
                                    </div>
                                </div>

                                <!-- Closed Book Section -->
                                <div style="border-right: 1px solid rgba(0,0,0,0.05); padding-right: 15px;">
                                    <h4
                                        style="font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; color: var(--danger);">
                                        Closed Book Configuration</h4>
                                    <div class="form-group" style="margin-bottom: 6px;">
                                        <label class="form-label" style="font-size: 0.65rem;">Prefix (e.g. Mig)</label>
                                        <input type="text" class="form-control form-control-sm" th:field="*{closedBookPrefix}" required>
                                    </div>
                                    <div class="form-group" style="margin-bottom: 6px;">
                                        <label class="form-label" style="font-size: 0.65rem;">Fix String (e.g. App)</label>
                                        <input type="text" class="form-control form-control-sm" th:field="*{closedBookFixString}" required>
                                    </div>
                                    <div class="form-group" style="margin-bottom: 6px;">
                                        <label class="form-label" style="font-size: 0.65rem;">Major (e.g. 11.3)</label>
                                        <input type="text" class="form-control form-control-sm" th:field="*{closedBookMajorVersion}" required>
                                    </div>
                                    <div class="form-group" style="margin-bottom: 6px;">
                                        <label class="form-label" style="font-size: 0.65rem;">Minor (e.g. 04)</label>
                                        <input type="text" class="form-control form-control-sm" th:field="*{closedBookMinorVersion}" required>
                                    </div>
                                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 5px;">
                                        <div class="form-group">
                                            <label class="form-label" style="font-size: 0.65rem;">RPP1</label>
                                            <input type="number" class="form-control form-control-sm" th:field="*{closedBookRPP1}" required>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label" style="font-size: 0.65rem;">RPP2</label>
                                            <input type="number" class="form-control form-control-sm" th:field="*{closedBookRPP2}" required>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label" style="font-size: 0.65rem;">RPP3</label>
                                            <input type="number" class="form-control form-control-sm" th:field="*{closedBookRPP3}" required>
                                        </div>
                                    </div>
                                    <div class="form-group" style="margin-top: 8px;">
                                        <label class="form-label" style="color: var(--danger); font-size: 0.65rem;">Last Deployed Version</label>
                                        <input type="text" class="form-control form-control-sm" th:field="*{closedBookLastDeployedPatch}" required>
                                    </div>
                                </div>

                                <!-- Migration Section -->
                                <div>
                                    <h4
                                        style="font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; color: var(--warning);">
                                        Max Migration Config</h4>
                                    <div class="form-group" style="margin-bottom: 6px;">
                                        <label class="form-label" style="font-size: 0.65rem;">Prefix (e.g. Max)</label>
                                        <input type="text" class="form-control form-control-sm" th:field="*{maxMigPrefix}" required>
                                    </div>
                                    <div class="form-group" style="margin-bottom: 6px;">
                                        <label class="form-label" style="font-size: 0.65rem;">Fix String (e.g. App)</label>
                                        <input type="text" class="form-control form-control-sm" th:field="*{maxMigFixString}" required>
                                    </div>
                                    <div class="form-group" style="margin-bottom: 6px;">
                                        <label class="form-label" style="font-size: 0.65rem;">Major (e.g. 11.3)</label>
                                        <input type="text" class="form-control form-control-sm" th:field="*{maxMigMajorVersion}" required>
                                    </div>
                                    <div class="form-group" style="margin-bottom: 6px;">
                                        <label class="form-label" style="font-size: 0.65rem;">Minor (e.g. 04)</label>
                                        <input type="text" class="form-control form-control-sm" th:field="*{maxMigMinorVersion}" required>
                                    </div>
                                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 5px;">
                                        <div class="form-group">
                                            <label class="form-label" style="font-size: 0.65rem;">RPP1</label>
                                            <input type="number" class="form-control form-control-sm" th:field="*{maxMigRPP1}" required>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label" style="font-size: 0.65rem;">RPP2</label>
                                            <input type="number" class="form-control form-control-sm" th:field="*{maxMigRPP2}" required>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label" style="font-size: 0.65rem;">RPP3</label>
                                            <input type="number" class="form-control form-control-sm" th:field="*{maxMigRPP3}" required>
                                        </div>
                                    </div>
                                    <div class="form-group" style="margin-top: 8px;">
                                        <label class="form-label" style="color: var(--warning); font-size: 0.65rem;">Last Deployed Version</label>
                                        <input type="text" class="form-control form-control-sm" th:field="*{maxMigLastDeployedPatch}" required>
                                    </div>
                                </div>
                            </div>

                            <div
                                style="margin-top: 25px; padding-top: 15px; border-top: 1px solid rgba(26,54,126,0.1); display:flex; gap:10px;">
                                <button type="submit" class="btn btn-primary" style="flex: 2; padding: 0.5rem;">
                                    Save System Configuration
                                </button>
                                <a th:href="@{/tasks}" class="btn btn-outline"
                                    style="flex: 1; padding: 0.5rem; text-align:center; text-decoration:none;">
                                    Cancel
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
