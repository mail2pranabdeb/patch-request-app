<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('Prepare Patch - PatchReq')}"></head>

<body>
    <div th:replace="~{fragments :: sidebar}"></div>

    <div class="main-content">
        <div th:replace="~{fragments :: topbar}"></div>
        <div class="content-area" style="align-items: center; justify-content: flex-start;">
            <div class="card" style="width: 100%; max-width: 800px; margin-top: 10px; margin-bottom: 30px;">
                <div
                    style="font-size: 1.6rem; font-weight: 800; margin-bottom: 20px; color: var(--text-main); border-bottom: 2px solid #f1f5f9; padding-bottom: 18px; letter-spacing: -0.02em;">
                    Prepare Patch Container</div>
                <div
                    style="display: flex; align-items: center; gap: 20px; padding: 25px; background: #f8fafc; border-radius: 12px; border: 1px dashed var(--border);">
                    <div
                        style="background: #e0e7ff; color: var(--primary); padding: 18px; border-radius: 50%; box-shadow: inset 0 2px 4px rgba(255,255,255,0.5);">
                        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path
                                d="M21.2 15c.7-1.2 1-2.5.7-3.9-.6-2-2.4-3.5-4.4-3.5h-1.2c-.7-3-3.2-5.2-6.2-5.6-3-.3-5.9 1.3-7.3 4-1.2 2.5-1 6.5.5 8.7m8.5 5.5v-8m-3 3 3-3 3 3" />
                        </svg>
                    </div>
                    <div>
                        <h3
                            style="margin: 0; font-size: 1.15rem; color: var(--text-main); font-weight: 700; margin-bottom: 6px;">
                            Future Feature Provision</h3>
                        <p style="color: var(--text-muted); font-size: 0.95rem; margin: 0; line-height: 1.6;">This
                            section is fully provisioned. In upcoming releases, you will use this terminal interface to
                            securely upload external files and orchestrate automated ZIP configurations before final
                            staging operations.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
