<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('Patch Request Form - PatchReq')}"></head>

<body>
    <div th:replace="~{fragments :: sidebar}"></div>

    <div class="main-content">
        <div th:replace="~{fragments :: topbar}"></div>
        <div class="content-area">
            <div class="card" style="max-width: 600px; margin: 0 auto;">
                <div class="card-title"
                    th:text="${task.id == null ? 'Generate New Patch Number' : 'Edit Patch Request'}">Form</div>

                <form th:action="@{/tasks/save}" th:object="${task}" method="post">
                    <input type="hidden" th:field="*{id}" />
                    <input type="hidden" th:field="*{patchNumber}" />

                    <div class="form-group">
                        <label class="form-label">Book Type <span style="color:var(--danger-color);">*</span></label>
                        <div style="display: flex; gap: 15px; margin-top: 5px;">
                            <label style="display: flex; align-items: center; gap: 5px;"><input type="radio"
                                    th:field="*{bookType}" value="Open Book" required> Open Book</label>
                            <label style="display: flex; align-items: center; gap: 5px;"><input type="radio"
                                    th:field="*{bookType}" value="Closed Book" required> Closed Book</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Line Type <span style="color:var(--danger-color);">*</span></label>
                        <div style="display: flex; gap: 15px; margin-top: 5px;">
                            <label style="display: flex; align-items: center; gap: 5px;"><input type="radio"
                                    th:field="*{lineType}" value="RPP1" required> RPP1</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Task Number <span style="color:var(--danger-color);">*</span></label>
                        <input type="text" class="form-control" th:field="*{taskNumber}" required
                            placeholder="Task identifier">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Short Description <span
                                style="color:var(--danger-color);">*</span></label>
                        <input type="text" class="form-control" th:field="*{taskShortDescription}" required
                            placeholder="Brief description of the patch">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Requested By <span style="color:var(--danger-color);">*</span></label>
                        <input type="text" class="form-control" th:field="*{requestedBy}" required
                            placeholder="Your name or team">
                    </div>

                    <div style="margin-top: 25px; display: flex; gap: 10px;">
                        <button type="submit" class="btn btn-primary" style="flex:1;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                                <polyline points="17 21 17 13 7 13 7 21" />
                                <polyline points="7 3 7 8 15 8" />
                            </svg> <span
                                th:text="${task.id == null ? 'Generate Patch & Save' : 'Update Record'}">Save</span>
                        </button>
                        <a th:href="@{/tasks}" class="btn btn-outline" style="flex:1; text-align:center;">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
