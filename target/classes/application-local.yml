spring:
  datasource:
    url: jdbc:h2:file:./data/patchdb;MODE=Oracle;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  sql:
    init:
      # Only run if the database is newly created (embedded mode)
      mode: embedded
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  h2:
    console:
      enabled: true
      path: /h2-console
