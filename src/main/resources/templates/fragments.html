<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <title th:text="${title}">Patch Number Generation App</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=4.0)}">
</head>

<body>
    <div th:fragment="topbar" class="topbar">
        <div class="header-logo">
            <div style="background: var(--primary); color: white; padding: 4px; border-radius: 6px; display: flex; align-items: center; justify-content: center; margin-right: 10px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </div>
            <span style="font-weight: 600; font-size: 1.1rem; color: var(--text-main);">Patch Generation</span>
        </div>
        <div class="header-right">
            <span class="badge badge-info" style="border-radius: 999px;">v1.0.0</span>
        </div>
    </div>

    <div th:fragment="sidebar(activeMenu)" class="sidebar">
        <div class="sidebar-nav-title">Dashboards</div>
        <ul class="nav-links">
            <li th:classappend="${activeMenu == 'dashboard' ? 'active' : ''}"><a th:href="@{/}"><svg class="nav-icon"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <line x1="3" y1="9" x2="21" y2="9" />
                        <line x1="9" y1="21" x2="9" y2="9" />
                    </svg> Analytics Dashboard</a></li>
        </ul>

        <div class="sidebar-nav-title">Patch Management</div>
        <ul class="nav-links">
            <li th:classappend="${activeMenu == 'list' ? 'active' : ''}"><a th:href="@{/tasks}"><svg class="nav-icon"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 6h16M4 12h16M4 18h16" />
                    </svg> Patch List</a></li>
            <li th:classappend="${activeMenu == 'new' ? 'active' : ''}"><a th:href="@{/tasks/new}"><svg class="nav-icon"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14" />
                    </svg> Generate Patch Number</a></li>
            <li th:classappend="${activeMenu == 'prepare' ? 'active' : ''}"><a th:href="@{/prepare}"><svg
                        class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" />
                    </svg> Prepare Patch</a></li>
        </ul>

        <div class="sidebar-nav-title" sec:authorize="isAuthenticated()">Administrator</div>
        <ul class="nav-links" sec:authorize="isAuthenticated()">
            <li th:classappend="${activeMenu == 'config' ? 'active' : ''}"><a th:href="@{/config}"><svg class="nav-icon"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg> Settings</a></li>
            <li>
                <form th:action="@{/logout}" method="post" style="padding: 10px 1.5rem; margin-top: 10px;">
                    <button type="submit" class="btn btn-outline" style="width:100%; text-align:center;">Secure
                        Logout</button>
                </form>
            </li>
        </ul>
        <div class="sidebar-nav-title" sec:authorize="!isAuthenticated()">Access</div>
        <ul class="nav-links" sec:authorize="!isAuthenticated()">
            <li><a th:href="@{/login}" class="btn btn-primary"
                    style="margin: 0 1.5rem; justify-content:center; color:#fff;">Login to Edit</a></li>
        </ul>
    </div>
</body>

</html>
