<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login - PatchReq</title>
    <!-- Cache buster appended to apply new redesign robustly -->
    <link rel="stylesheet" th:href="@{/css/style.css(v=4.0)}">
</head>

<body style="background: #f1f4f6; align-items:center; justify-content:center; padding:20px;">

    <div style="width: 100%; max-width: 440px; text-align:center; margin-bottom: 25px;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5">
            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
        </svg>
        <h2 style="margin-top:15px; font-weight:500; color:var(--text-main); font-size: 1.5rem;">Architect
            Authentication</h2>
    </div>

    <div class="card" style="width: 100%; max-width: 440px; padding: 40px;">
        <div th:if="${param.error}"
            style="margin-bottom:20px; padding:12px; background:#fef2f2; color:var(--danger); border-radius:0.25rem; font-size:0.9rem; text-align:center; border: 1px solid #fecaca;">
            Invalid credentials provided.
        </div>
        <div th:if="${param.logout}"
            style="margin-bottom:20px; padding:12px; background:#ecfdf5; color:var(--success); border-radius:0.25rem; font-size:0.9rem; text-align:center; border: 1px solid #10b981;">
            Securely logged out.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group" style="margin-bottom: 20px;">
                <label class="form-label">Administrator Identity</label>
                <input type="text" name="username" class="form-control" required autofocus placeholder="System Admin">
            </div>
            <div class="form-group" style="margin-bottom: 25px;">
                <label class="form-label">Password Key</label>
                <input type="password" name="password" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; padding:0.6rem; font-size:1rem;">
                Login to Dashboard
            </button>
        </form>
    </div>

    <div style="width: 100%; max-width: 440px; text-align:center; margin-top: 20px;">
        <a th:href="@{/}" class="btn btn-outline" style="border:none; color:var(--primary); font-size:0.9rem;">Back to
            Public Analytics</a>
    </div>

</body>

</html>
