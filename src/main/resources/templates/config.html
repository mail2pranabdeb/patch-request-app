<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments :: head('Configuration - PatchReq')}"></head>

<body>
    <div th:replace="~{fragments :: sidebar}"></div>

    <div class="main-content">
        <div th:replace="~{fragments :: topbar}"></div>
        <div class="content-area" style="align-items: center; justify-content: flex-start;">
            <div class="card" style="width: 100%; max-width: 680px; margin-top: 10px; margin-bottom: 30px;">
                <div
                    style="font-size: 1.6rem; font-weight: 800; margin-bottom: 30px; color: var(--text-main); border-bottom: 2px solid #f1f5f9; padding-bottom: 18px; letter-spacing: -0.02em;">
                    System Configuration</div>

                <div th:if="${param.success}"
                    style="background:#ecfdf5; color:#065f46; margin-bottom: 25px; padding: 16px 20px; font-size:1rem; font-weight: 500; border-radius:12px; border: 1px solid #a7f3d0; box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.1); display: flex; align-items:center; gap:10px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                        <polyline points="22 4 12 14.01 9 11.01" />
                    </svg>
                    Configuration saved securely!
                </div>

                <form th:action="@{/config/save}" th:object="${config}" method="post">
                    <input type="hidden" th:field="*{id}" />

                    <div class="form-group">
                        <label class="form-label">Sequence Date Format</label>
                        <input type="text" class="form-control" th:field="*{dateFormat}" required
                            placeholder="e.g., yyyyMMdd">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Sequence Length</label>
                        <input type="number" class="form-control" th:field="*{sequenceLength}" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Open Book Last Deployed Patch</label>
                        <input type="text" class="form-control" th:field="*{openBookLastDeployedPatch}"
                            placeholder="Record the latest patch here">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Closed Book Last Deployed Patch</label>
                        <input type="text" class="form-control" th:field="*{closedBookLastDeployedPatch}"
                            placeholder="Record the latest patch here">
                    </div>

                    <div style="margin-top: 35px; padding-top: 20px; border-top: 1px solid #f1f5f9;">
                        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5">
                                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                                <polyline points="17 21 17 13 7 13 7 21" />
                                <polyline points="7 3 7 8 15 8" />
                            </svg>
                            Save System Configuration
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
