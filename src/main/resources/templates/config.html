<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments :: head('Configuration - Patch Number Generation App')}"></head>

<body>
    <div th:replace="~{fragments :: topbar}"></div>

    <div class="app-container">
        <div th:replace="~{fragments :: sidebar('config')}"></div>

        <div class="main-wrapper">
            <div class="app-page-title">
                <div class="page-title-heading">
                    <div class="page-title-icon" style="color: var(--warning);">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="3" />
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                        </svg>
                    </div>
                    <div class="page-title-text">
                        <h2>System Configuration</h2>
                        <p>Configure internal Datafix mechanisms and backend identifiers.</p>
                    </div>
                </div>
            </div>

            <div class="content-area">
                <div th:if="${param.success}"
                    style="background:#ecfdf5; color:#065f46; margin-bottom: 10px; padding: 8px 15px; border-radius:0.25rem; font-size: 0.85rem; border: 1px solid #10b981;">
                    <strong>Success!</strong> Configuration parameters updated securely.
                </div>

                <div class="card" style="max-width: 800px;">
                    <div class="card-body">
                        <form th:action="@{/config/save}" th:object="${config}" method="post">
                            <input type="hidden" th:field="*{id}" />

                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                                <!-- Open Book Section -->
                                <div style="border-right: 1px solid rgba(0,0,0,0.05); padding-right: 20px;">
                                    <h4 style="font-size: 0.95rem; font-weight: 600; margin-bottom: 15px; color: var(--primary);">Open Book Patch Series</h4>
                                    <div class="form-group" style="margin-bottom: 12px;">
                                        <label class="form-label">RPP1 Current Sequence</label>
                                        <input type="number" class="form-control" th:field="*{openBookRPP1}" required>
                                    </div>
                                    <div class="form-group" style="margin-bottom: 12px;">
                                        <label class="form-label">RPP2 Current Sequence</label>
                                        <input type="number" class="form-control" th:field="*{openBookRPP2}" required>
                                    </div>
                                    <div class="form-group" style="margin-bottom: 12px;">
                                        <label class="form-label">RPP3 Current Sequence</label>
                                        <input type="number" class="form-control" th:field="*{openBookRPP3}" required>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label" style="color: var(--primary);">Last Deployed Patch (Prod)</label>
                                        <input type="text" class="form-control" th:field="*{openBookLastDeployedPatch}"
                                            placeholder="e.g., OB-RPP1-0099">
                                    </div>
                                </div>

                                <!-- Closed Book Section -->
                                <div>
                                    <h4 style="font-size: 0.95rem; font-weight: 600; margin-bottom: 15px; color: var(--danger);">Closed Book Patch Series</h4>
                                    <div class="form-group" style="margin-bottom: 12px;">
                                        <label class="form-label">RPP1 Current Sequence</label>
                                        <input type="number" class="form-control" th:field="*{closedBookRPP1}" required>
                                    </div>
                                    <div class="form-group" style="margin-bottom: 12px;">
                                        <label class="form-label">RPP2 Current Sequence</label>
                                        <input type="number" class="form-control" th:field="*{closedBookRPP2}" required>
                                    </div>
                                    <div class="form-group" style="margin-bottom: 12px;">
                                        <label class="form-label">RPP3 Current Sequence</label>
                                        <input type="number" class="form-control" th:field="*{closedBookRPP3}" required>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label" style="color: var(--danger);">Last Deployed Patch (Prod)</label>
                                        <input type="text" class="form-control" th:field="*{closedBookLastDeployedPatch}"
                                            placeholder="e.g., CB-RPP1-0099">
                                    </div>
                                </div>
                            </div>

                            <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(26,54,126,0.1);">
                            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.4rem;">
                                Save System Configuration
                            </button>
                    </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    </div>
</body>

</html>
