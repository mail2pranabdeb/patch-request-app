<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments :: head('Dashboard - PatchReq')}"></head>

<body>
    <div th:replace="~{fragments :: sidebar}"></div>

    <div class="main-content">
        <div th:replace="~{fragments :: topbar}"></div>
        <div class="content-area">

            <div th:if="${successMessage}"
                style="background:#ecfdf5; color:#065f46; margin-bottom: 25px; padding: 16px 20px; font-size:1rem; font-weight: 500; border-radius:12px; border: 1px solid #a7f3d0; box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.1); display: flex; align-items:center; gap:10px;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                    <polyline points="22 4 12 14.01 9 11.01" />
                </svg>
                <span th:text="${successMessage}"></span>
            </div>

            <div class="card"
                style="flex: 1; display: flex; flex-direction: column; min-height: 0; padding: 25px; margin-bottom: 0;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                    <h2
                        style="font-size: 1.45rem; font-weight: 800; color: var(--text-main); letter-spacing: -0.02em; margin: 0;">
                        Patch Requests</h2>
                    <div style="display: flex; gap: 12px;">
                        <button id="grid-export" class="btn btn-outline" title="Export current grid data to CSV"><svg
                                width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />
                            </svg> Export</button>
                        <a th:href="@{/tasks/new}" class="btn btn-primary"><svg width="18" height="18"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <path d="M12 5v14M5 12h14" />
                            </svg> New Request</a>
                    </div>
                </div>

                <div style="margin-bottom: 15px; display: flex; justify-content: flex-start; flex-shrink: 0;">
                    <div style="position: relative; width: 100%; max-width: 350px;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" style="position: absolute; left: 12px; top: 13px; color: #94a3b8;">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                        <input type="text" id="grid-search" class="form-control"
                            style="padding-left: 40px; border-radius: 999px;"
                            placeholder="Search patch details across all records...">
                    </div>
                </div>

                <!-- AG Grid container -->
                <div id="myGrid" class="ag-theme-alpine"
                    style="flex: 1; min-height: 0; width: 100%; border-radius: 8px; border: 1px solid var(--border); overflow: hidden;">
                </div>
            </div>
        </div>
    </div>

    <!-- Auth Flags and Row Data via Thymeleaf -->
    <script th:inline="javascript">
        var isAuthenticated = false;
    </script>
    <script th:inline="javascript" sec:authorize="isAuthenticated()">
        isAuthenticated = true;
    </script>
    <script th:inline="javascript">
        var rowData = /*[[${tasks}]]*/[];
    </script>

    <!-- AG Grid Community Core & Styles Local -->
    <link rel="stylesheet" th:href="@{/vendor/ag-grid/ag-grid.css}">
    <link rel="stylesheet" th:href="@{/vendor/ag-grid/ag-theme-alpine.css}">
    <script th:src="@{/vendor/ag-grid/ag-grid-community.min.js}"></script>

    <!-- Initialize AG Grid -->
    <script th:src="@{/js/ag-grid-init.js}"></script>
    <style>
        .ag-theme-alpine {
            --ag-border-color: transparent;
            --ag-row-border-color: #f1f5f9;
            --ag-header-background-color: #f8fafc;
            --ag-header-foreground-color: #475569;
            --ag-font-family: inherit;
            --ag-font-size: 0.95rem;
        }

        .ag-theme-alpine .ag-header-cell-label {
            font-weight: 600;
        }
    </style>
</body>

</html>
