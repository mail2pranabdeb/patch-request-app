<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments :: head('Patch Requests - Patch Number Generation App')}"></head>

<body>
    <div th:replace="~{fragments :: topbar}"></div>

    <div class="app-container">
        <div th:replace="~{fragments :: sidebar('list')}"></div>

        <div class="main-wrapper">
            <div class="app-page-title">
                <div class="page-title-heading">
                    <div class="page-title-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </div>
                    <div class="page-title-text">
                        <h2>Patch Requests Table</h2>
                        <p>Search, filter, and export the entire Datafix activity logs here.</p>
                    </div>
                </div>
            </div>

            <div class="content-area">
                <div th:if="${successMessage}"
                    style="background:#ecfdf5; color:#065f46; margin-bottom: 10px; padding: 8px 15px; font-size:0.85rem; border-radius:0.25rem; border: 1px solid #10b981; flex-shrink: 0;">
                    <span th:text="${successMessage}"></span>
                </div>

                <div class="card"
                    style="flex: 1; display: flex; flex-direction: column; min-height: 0; margin-bottom: 0;">
                    <div class="card-header">
                        Interactive Data Grid
                        <div style="display: flex; gap: 8px;">
                            <button id="grid-export" class="btn btn-outline" style="padding: 0.25rem 0.5rem;"><svg
                                    width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />
                                </svg> Export</button>
                            <a th:href="@{/tasks/new}" class="btn btn-primary" style="padding: 0.25rem 0.6rem;"><svg
                                    width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.5">
                                    <path d="M12 5v14M5 12h14" />
                                </svg> New</a>
                        </div>
                    </div>

                    <div class="card-body" style="padding: 10px 15px; display: flex; flex-direction: column;">
                        <input type="text" id="grid-search" class="form-control"
                            style="max-width: 250px; margin-bottom: 10px; flex-shrink: 0; padding: 0.3rem 0.6rem; font-size: 0.85rem;"
                            placeholder="Search patch details across records...">
                        <!-- AG Grid container -->
                        <div id="myGrid" class="ag-theme-alpine"
                            style="flex: 1; min-height: 0; width: 100%; border-radius: 4px; border: 1px solid var(--border); overflow: hidden;">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        var isAuthenticated = false;
    </script>
    <script th:inline="javascript" sec:authorize="isAuthenticated()">
        isAuthenticated = true;
    </script>
    <script th:inline="javascript">
        var rowData = /*[[${tasks}]]*/[];
    </script>

    <link rel="stylesheet" th:href="@{/vendor/ag-grid/ag-grid.css}">
    <link rel="stylesheet" th:href="@{/vendor/ag-grid/ag-theme-alpine.css}">
    <script th:src="@{/vendor/ag-grid/ag-grid-community.min.js}"></script>
    <script th:src="@{/js/ag-grid-init.js}"></script>
</body>

</html>
